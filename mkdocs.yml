                - Collections: lonala/builtins/collections.md
                - Sorted Collections: lonala/builtins/sorted-collections.md
                - Atoms: lonala/builtins/atoms.md
                - Symbols: lonala/builtins/symbols.md
                - Binary: lonala/builtins/binary.md
                - Metadata: lonala/builtins/metadata.md
                - Error Handling: lonala/builtins/error-handling.md
                - I/O: lonala/builtins/io.md
                - Hardware: lonala/builtins/hardware.md
