site_name: "Lona — LISP Machines Never Died. They Evolved."
site_description: LISP Machines Never Died. They Evolved.
site_author: Tobias Sarnowski
copyright: Copyright (C) 2025 Tobias Sarnowski - GPL-3.0-or-later

docs_dir: docs

extra:
    version: !ENV [LONA_VERSION, "dev"]

extra_css:
    - overrides/stylesheets/fonts.css
    - overrides/stylesheets/living-manual.css
    - overrides/stylesheets/hero.css

theme:
    name: material
    custom_dir: docs/overrides
    logo: assets/logo.svg
    favicon: assets/favicon.svg
    palette:
        scheme: living-manual
        primary: custom
        accent: custom
    features:
        - navigation.tabs
        - navigation.sections
        - navigation.indexes
        - navigation.top
        - search.suggest
        - search.highlight
        - content.code.copy

plugins:
    - search

markdown_extensions:
    - pymdownx.highlight:
          anchor_linenums: true
          use_pygments: true
          pygments_lang_class: true
    - pymdownx.superfences:
          custom_fences:
              - name: mermaid
                class: mermaid
                format: !!python/name:pymdownx.superfences.fence_code_format
    - pymdownx.inlinehilite
    - pymdownx.snippets:
          auto_append:
              - docs/includes/glossary.md
    - abbr
    - admonition
    - pymdownx.details
    - tables
    - attr_list
    - md_in_html
    - pymdownx.emoji:
          emoji_index: !!python/name:material.extensions.emoji.twemoji
          emoji_generator: !!python/name:material.extensions.emoji.to_svg
    - toc:
          permalink: true
          toc_depth: 2

nav:
    - Project:
          - Home: index.md
          - Goals:
                - goals/index.md
                - "Pillar: seL4": goals/pillar-sel4.md
                - "Pillar: BEAM/OTP": goals/pillar-beam.md
                - "Pillar: LISP Machine": goals/pillar-lisp-machine.md
                - "Pillar: Clojure": goals/pillar-clojure.md
                - Core Concepts: goals/core-concepts.md
                - System Design: goals/system-design.md
                - Non-Goals: goals/non-goals.md
          - License: license.md

    - Installation: installation.md

    - Lonala Language:
          - lonala/index.md
          - Introduction: lonala/introduction.md
          - Lexical Structure: lonala/lexical-structure.md
          - Data Types: lonala/data-types.md
          - Literals: lonala/literals.md
          - Evaluation: lonala/evaluation.md
          - Special Forms: lonala/special-forms.md
          - Operators: lonala/operators.md
          - Functions: lonala/functions.md
          - Reader Macros: lonala/reader-macros.md
          - Macros: lonala/macros.md
          - Namespaces: lonala/namespaces.md
