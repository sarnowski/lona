# Lona OS GRUB Configuration for x86_64 UEFI

set timeout=3
set default=0

# Serial console is default for headless operation (QEMU, servers)
menuentry "Lona OS (Serial Console)" {
    multiboot2 /lona/kernel-x86_64.elf console=serial
    module2 /lona/lona-x86_64.elf
    boot
}

menuentry "Lona OS (VGA Console)" {
    multiboot2 /lona/kernel-x86_64.elf
    module2 /lona/lona-x86_64.elf
    boot
}
